*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Alibaba PuHuiTi 3.0', sans-serif;
  font-weight: 400;
  background: #FFFFFF;
  color: #0F172A;
  width: 1280px;
  height: 720px;
  overflow: hidden;
  position: relative;
}

.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2.5px;
  background: #2563EB;
  z-index: 10;
}

.slide-root {
  width: 1280px;
  height: 720px;
  padding: 24px 48px 24px 48px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.slide-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.slide-title {
  font-size: 30px;
  font-weight: 700;
  color: #0F172A;
  line-height: 1.3;
  letter-spacing: -0.3px;
}

.slide-subtitle {
  font-size: 20px;
  font-weight: 400;
  color: #64748B;
  line-height: 1.4;
}

.separator {
  width: 140px;
  height: 1px;
  background: #E2E8F0;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.slide-body {
  flex: 1;
  display: flex;
  gap: 32px;
  min-height: 0;
}

.content-left {
  flex: 0 0 58%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #F8FAFC;
  border: 0.5px solid #E2E8F0;
  border-radius: 10px;
  padding: 16px;
  overflow: hidden;
}

.content-left img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
}

.content-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  justify-content: space-between;
}

.table-label {
  font-size: 20px;
  font-weight: 500;
  color: #2563EB;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table .t-row {
  display: flex;
  align-items: center;
  border-bottom: 0.5px solid #E2E8F0;
  padding: 6px 0;
}

.data-table .t-row.t-header {
  border-bottom: 1.5px solid #2563EB;
  padding-bottom: 8px;
  margin-bottom: 2px;
}

.data-table .t-row.t-crossover {
  background: rgba(37, 99, 235, 0.06);
  border-radius: 4px;
  border-bottom: 0.5px solid rgba(37, 99, 235, 0.2);
}

.data-table .t-cell {
  flex: 1;
  font-size: 20px;
  color: #475569;
  text-align: center;
  line-height: 1.4;
}

.data-table .t-cell.t-label {
  flex: 0 0 60px;
  font-weight: 500;
  color: #0F172A;
  text-align: left;
}

.data-table .t-header .t-cell {
  font-size: 18px;
  font-weight: 500;
  color: #64748B;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table .t-row.t-crossover .t-cell {
  color: #0F172A;
  font-weight: 500;
}

.t-delta-neg { color: #64748B; }
.t-delta-pos { color: #2563EB; font-weight: 500; }

.crossover-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(37, 99, 235, 0.08);
  border: 0.5px solid rgba(37, 99, 235, 0.25);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 18px;
  font-weight: 500;
  color: #2563EB;
  margin-left: 8px;
}

.insight-card {
  background: #F8FAFC;
  border: 0.5px solid #E2E8F0;
  border-left: 3px solid #2563EB;
  border-radius: 8px;
  padding: 16px 18px;
}

.insight-heading {
  font-size: 20px;
  font-weight: 500;
  color: #2563EB;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.insight-heading svg {
  flex-shrink: 0;
}

.insight-text {
  font-size: 22px;
  font-weight: 400;
  color: #0F172A;
  line-height: 1.6;
}

.insight-text .highlight {
  color: #2563EB;
  font-weight: 500;
}

.page-number {
  position: absolute;
  bottom: 24px;
  right: 48px;
  font-size: 18px;
  font-weight: 400;
  color: #64748B;
}

/* Decorative hexagons per styleGuide */
.hex-deco {
  position: absolute;
  border: 1px solid rgba(37, 99, 235, 0.10);
  border-radius: 2px;
  pointer-events: none;
  z-index: 0;
}

.hex-deco-1 {
  width: 48px; height: 48px;
  bottom: 60px; right: 40px;

  border: none;
  outline: 1.5px solid rgba(37, 99, 235, 0.10);

.hex-deco-2 {

  outline: 1px solid rgba(37, 99, 235, 0.08);

.hex-deco-3 {

  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  border: none;
  outline: 1px solid rgba(37, 99, 235, 0.12);
}
