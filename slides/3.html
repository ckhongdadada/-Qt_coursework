    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      overflow: hidden;
    }

    .canvas {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top blue bar */
    .top-bar {
      width: 100%;
      height: 2.5px;
      background: #2563EB;
      flex-shrink: 0;
    }

    /* Page header area */
    .page-header {
      padding: 36px 64px 0 64px;
      flex-shrink: 0;
    }

    .page-label {
      font-size: 18px;
      font-weight: 500;
      color: #2563EB;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      line-height: 1;
      margin-bottom: 12px;
    }

    .header-divider {
      width: 100%;
      height: 0;
      border-top: 0.5px solid #E2E8F0;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 500;
      color: #0F172A;
      line-height: 1.3;
    }

    /* Cards area */
    .cards-area {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 36px 64px 0 64px;
      gap: 24px;
    }

    .card {
      flex: 1;
      background: #F8FAFC;
      border: 0.5px solid #E2E8F0;
      border-radius: 6px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
    }

    .card-num-title {
      font-size: 22px;
      font-weight: 700;
      color: #0F172A;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .card-num-title .circled {
      color: #2563EB;
      font-weight: 700;
      margin-right: 6px;
    }

    .card-divider {
      width: 32px;
      height: 2px;
      background: #2563EB;
      margin-bottom: 18px;
      border-radius: 1px;
    }

    .card-desc {
      font-size: 22px;
      font-weight: 400;
      color: #475569;
      line-height: 1.6;
      flex: 1;
    }

    .card-desc .term {
      font-weight: 500;
      color: #0F172A;
    }

    /* Hexagon decorations — bottom right */
    .hex-group {
      position: absolute;
      bottom: 0;
      right: 0;
      pointer-events: none;
      z-index: 0;
    }

    .hex-group svg {
      position: absolute;
    }

    /* Page number */
    .page-number {
      position: absolute;
      bottom: 22px;
      right: 43px;
      font-size: 18px;
      font-weight: 400;
      color: #64748B;
      z-index: 2;
    }
