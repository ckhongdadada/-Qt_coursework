<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标准AL策略在分布谱系上的表现</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>

:root {
  /* Background */
  --bg-primary: #ffffff;
  --bg-gradient-to: #f6f8fb;

  /* Card */
  --card-from: #ffffff;
  --card-to: #f6f8fb;
  --card-border: rgba(10,29,58,0.06);
  --card-radius: 12px;

  /* Text */
  --text-primary: #0a1d3a;
  --text-secondary: #64748b;

  /* Accent */
  --accent-primary: #2563EB;
  --accent-primary-dark: #1D4ED8;
  --accent-secondary: #059669;

  /* Typography */
  --font-display: -apple-system, 'SF Pro Display', 'Inter Tight', 'Inter', BlinkMacSystemFont, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Inter', sans-serif;
  --font-serif: 'Instrument Serif', 'Fraunces', Georgia, serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', monospace;

  /* Letter Spacing */
  --ls-display: -0.042em;
  --ls-headline: -0.02em;
  --ls-body: -0.005em;
  --ls-label: 0.22em;
}


/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }

.slide {
  width: 1280px;
  height: 720px;
  position: relative;
  overflow: hidden;
  background: var(--bg-primary);
  font-family: var(--font-body);
  color: var(--text-primary);
  font-feature-settings: 'kern', 'liga', 'calt', 'ss01', 'cv11', 'ccmp';
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Top accent bar - subtle */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-primary-dark));
  opacity: 0.8;
}

/* Page header with dot-pulse label */
.page-header {
  padding: 48px 64px 0;
}

.page-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-primary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  margin-bottom: 16px;
}

.page-label::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-primary);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.page-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: var(--ls-headline);
  line-height: 1.2;
}

/* Serif italic for emphasis */
.page-title em,
.highlight em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--accent-primary);
}

/* Header divider */
.header-divider {
  width: 100%;
  height: 1px;
  background: var(--card-border);
  margin: 20px 0;
}

/* Content area */
.content {
  padding: 24px 64px 48px;
  flex: 1;
}

/* Cards grid - Bento style */
.cards-grid {
  display: grid;
  gap: 16px;
}

.cards-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cards-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cards-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

/* Card - Apple minimal */
.card {
  background: linear-gradient(135deg, var(--card-from), var(--card-to));
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  padding: 24px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.04);
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-primary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  margin-bottom: 12px;
}

.card-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: var(--ls-headline);
  margin-bottom: 8px;
}

.card-body {
  font-size: 14px;
  color: var(--text-secondary);
  letter-spacing: var(--ls-body);
  line-height: 1.6;
}

/* Data numbers - tabular-nums */
.data-number {
  font-family: var(--font-display);
  font-variant-numeric: tabular-nums proportional-nums;
  font-weight: 700;
  color: var(--text-primary);
}

.data-number.large {
  font-size: 48px;
  letter-spacing: var(--ls-display);
}

.data-number.medium {
  font-size: 32px;
  letter-spacing: var(--ls-headline);
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  padding: 12px 16px;
  text-align: left;
  border-bottom: 2px solid var(--card-border);
}

.data-table td {
  font-size: 14px;
  color: var(--text-primary);
  padding: 12px 16px;
  border-bottom: 1px solid var(--card-border);
  font-variant-numeric: tabular-nums;
}

.data-table tr:last-child td {
  border-bottom: none;
}

/* Page number */
.page-number {
  position: absolute;
  bottom: 24px;
  right: 48px;
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

/* Corner decoration lines - Apple style */
.corner-lines {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  pointer-events: none;
}

.corner-lines::before,
.corner-lines::after {
  content: '';
  position: absolute;
  background: var(--accent-primary);
  opacity: 0.15;
}

.corner-lines::before {
  top: 0;
  right: 0;
  width: 1px;
  height: 20px;
}

.corner-lines::after {
  top: 0;
  right: 0;
  width: 20px;
  height: 1px;
}

/* Inner frame - subtle border */
.inner-frame {
  position: absolute;
  inset: 16px;
  border: 1px solid var(--card-border);
  border-radius: 4px;
  pointer-events: none;
}

/* Hexagon decorations - minimal */
.hex-decoration {
  position: absolute;
  pointer-events: none;
  opacity: 0.08;
}

/* Formulas */
.formula-block {
  background: var(--bg-gradient-to);
  border-left: 3px solid var(--accent-primary);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 16px 0;
}

.formula {
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--text-primary);
}

/* KaTeX overrides */
.katex { font-size: 1em; }
.katex-display { margin: 0; }

/* Chart container */
.chart-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
}

</style>
</head>
<body>

<section id="slide-7" class="slide-page">
  <div class="top-bar"></div>
  <div class="page-header">
    <div class="page-label">BASELINE ANALYSIS</div>
    <h1 class="page-title">标准AL策略在分布谱系上的表现</h1>
    <div class="header-divider"></div>
  </div>
  <div class="content">
    <div class="slide-root">
  <!-- Top blue bar -->
  <div class="top-bar"></div>

  <!-- Header -->
  <div class="slide-header">
    <div class="header-label">BASELINE ANALYSIS</div>
    <div class="header-divider"></div>
    <h1 class="slide-title">标准AL策略在分布谱系上的表现</h1>
  </div>

  <!-- Body -->
  <div class="slide-body">
    <!-- Chart 55% -->
    <div class="chart-col">
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <!-- Findings 45% -->
    <div class="findings-col">
      <div class="finding-item">
        <div class="finding-icon-row">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#2563EB" stroke-width="1"/><path d="M6 9l2 2 4-4" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="finding-tag">ρ = 1 · 均衡</span>
        </div>
        <div class="finding-title">QBC 最优 (0.4514)</div>
        <div class="finding-text">策略间差异约 <strong>5%</strong>，不确定性采样略有优势</div>
      </div>

      <div class="finding-item">
        <div class="finding-icon-row">
          <svg viewBox="0 0 18 18" fill="none"><path d="M3 14L9 4l6 10" stroke="#64748B" stroke-width="1" stroke-linejoin="round"/><line x1="9" y1="8" x2="9" y2="11" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="12.5" r="0.7" fill="#64748B"/></svg>
          <span class="finding-tag">ρ ≥ 20 · 中重度长尾</span>
        </div>
        <div class="finding-title">所有策略性能急剧下降</div>
        <div class="finding-text">Macro-F1 从 <strong>~0.42</strong> 跌至 <strong>~0.25</strong>，降幅超 40%</div>
      </div>

      <div class="finding-item">
        <div class="finding-icon-row">
          <svg viewBox="0 0 18 18" fill="none"><rect x="3" y="3" width="12" height="12" rx="1.5" stroke="#64748B" stroke-width="1"/><path d="M7 7l4 4M11 7l-4 4" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="finding-tag">ρ = 100 · 极端长尾</span>
        </div>
        <div class="finding-title">CoreSet 失效 (0.2102)</div>
        <div class="finding-text">低于 Random (<strong>0.2206</strong>)，多样性采样在长尾下反噬</div>
      </div>

      <div class="core-insight">
        <div class="core-insight-label">本质问题</div>
        <div class="core-insight-text">标准策略只关注"模型对哪个样本最不确定"，不关心"哪个类别最需要标注"</div>
      </div>
    </div>
  </div>

  <!-- Hexagon decorations bottom-right -->
  <div class="hex-deco">
    <svg width="120" height="100" viewBox="0 0 120 100">
      <polygon points="30,5 52,18 52,44 30,57 8,44 8,18" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.30"/>
      <polygon points="70,20 88,30 88,50 70,60 52,50 52,30" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.25"/>
      <polygon points="18,50 36,60 36,80 18,90 0,80 0,60" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.31"/>
      <polygon points="90,55 110,66 110,88 90,99 70,88 70,66" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.27"/>
      <polygon points="50,65 62,72 62,86 50,93 38,86 38,72" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.35"/>
    </svg>
  </div>
</div>
  </div>
  <div class="corner-lines"></div>
  <div class="page-number">7 / 20</div>
</section>

</body>
</html>
