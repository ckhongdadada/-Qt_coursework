<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消融实验：AL创新 vs SSL创新</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>

:root {
  /* Background */
  --bg-primary: #ffffff;
  --bg-gradient-to: #f6f8fb;

  /* Card */
  --card-from: #ffffff;
  --card-to: #f6f8fb;
  --card-border: rgba(10,29,58,0.06);
  --card-radius: 12px;

  /* Text */
  --text-primary: #0a1d3a;
  --text-secondary: #64748b;

  /* Accent */
  --accent-primary: #2563EB;
  --accent-primary-dark: #1D4ED8;
  --accent-secondary: #059669;

  /* Typography */
  --font-display: -apple-system, 'SF Pro Display', 'Inter Tight', 'Inter', BlinkMacSystemFont, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Inter', sans-serif;
  --font-serif: 'Instrument Serif', 'Fraunces', Georgia, serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', monospace;

  /* Letter Spacing */
  --ls-display: -0.042em;
  --ls-headline: -0.02em;
  --ls-body: -0.005em;
  --ls-label: 0.22em;
}


/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }

.slide {
  width: 1280px;
  height: 720px;
  position: relative;
  overflow: hidden;
  background: var(--bg-primary);
  font-family: var(--font-body);
  color: var(--text-primary);
  font-feature-settings: 'kern', 'liga', 'calt', 'ss01', 'cv11', 'ccmp';
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Top accent bar - subtle */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-primary-dark));
  opacity: 0.8;
}

/* Page header with dot-pulse label */
.page-header {
  padding: 48px 64px 0;
}

.page-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-primary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  margin-bottom: 16px;
}

.page-label::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-primary);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.page-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: var(--ls-headline);
  line-height: 1.2;
}

/* Serif italic for emphasis */
.page-title em,
.highlight em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--accent-primary);
}

/* Header divider */
.header-divider {
  width: 100%;
  height: 1px;
  background: var(--card-border);
  margin: 20px 0;
}

/* Content area */
.content {
  padding: 24px 64px 48px;
  flex: 1;
}

/* Cards grid - Bento style */
.cards-grid {
  display: grid;
  gap: 16px;
}

.cards-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cards-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cards-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

/* Card - Apple minimal */
.card {
  background: linear-gradient(135deg, var(--card-from), var(--card-to));
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  padding: 24px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.04);
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-primary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  margin-bottom: 12px;
}

.card-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: var(--ls-headline);
  margin-bottom: 8px;
}

.card-body {
  font-size: 14px;
  color: var(--text-secondary);
  letter-spacing: var(--ls-body);
  line-height: 1.6;
}

/* Data numbers - tabular-nums */
.data-number {
  font-family: var(--font-display);
  font-variant-numeric: tabular-nums proportional-nums;
  font-weight: 700;
  color: var(--text-primary);
}

.data-number.large {
  font-size: 48px;
  letter-spacing: var(--ls-display);
}

.data-number.medium {
  font-size: 32px;
  letter-spacing: var(--ls-headline);
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  padding: 12px 16px;
  text-align: left;
  border-bottom: 2px solid var(--card-border);
}

.data-table td {
  font-size: 14px;
  color: var(--text-primary);
  padding: 12px 16px;
  border-bottom: 1px solid var(--card-border);
  font-variant-numeric: tabular-nums;
}

.data-table tr:last-child td {
  border-bottom: none;
}

/* Page number */
.page-number {
  position: absolute;
  bottom: 24px;
  right: 48px;
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

/* Corner decoration lines - Apple style */
.corner-lines {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  pointer-events: none;
}

.corner-lines::before,
.corner-lines::after {
  content: '';
  position: absolute;
  background: var(--accent-primary);
  opacity: 0.15;
}

.corner-lines::before {
  top: 0;
  right: 0;
  width: 1px;
  height: 20px;
}

.corner-lines::after {
  top: 0;
  right: 0;
  width: 20px;
  height: 1px;
}

/* Inner frame - subtle border */
.inner-frame {
  position: absolute;
  inset: 16px;
  border: 1px solid var(--card-border);
  border-radius: 4px;
  pointer-events: none;
}

/* Hexagon decorations - minimal */
.hex-decoration {
  position: absolute;
  pointer-events: none;
  opacity: 0.08;
}

/* Formulas */
.formula-block {
  background: var(--bg-gradient-to);
  border-left: 3px solid var(--accent-primary);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 16px 0;
}

.formula {
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--text-primary);
}

/* KaTeX overrides */
.katex { font-size: 1em; }
.katex-display { margin: 0; }

/* Chart container */
.chart-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
}

</style>
</head>
<body>

<section id="slide-17" class="slide-page">
  <div class="top-bar"></div>
  <div class="page-header">
    <div class="page-label">ABLATION STUDY</div>
    <h1 class="page-title">消融实验：AL创新 vs SSL创新</h1>

  </div>

  <!-- Decorative hexagons bottom-right -->

  <svg class="hex-deco" style="bottom: 140px; right: 110px; opacity: 0.27;" width="44" height="50" viewBox="0 0 44 50" fill="none">
    <polygon points="22,2 41,13 41,36 22,47 3,36 3,13" stroke="#2563EB" stroke-width="1" fill="none"/>

  <svg class="hex-deco" style="bottom: 5px; right: 20px; opacity: 0.31;" width="60" height="70" viewBox="0 0 60 70" fill="none">
    <polygon points="30,2 56,18 56,50 30,66 4,50 4,18" stroke="#2563EB" stroke-width="1" fill="none"/>

  <!-- Page number -->
  <div class="page-number">17 / 20</div>
  </div>
  <div class="corner-lines"></div>
  <div class="page-number">17 / 20</div>
</section>

</body>
</html>
